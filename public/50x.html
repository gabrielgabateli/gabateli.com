<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>erro — gabriel gabateli</title>
  <link rel="icon" type="image/svg+xml" href="/favicon-light.svg" id="favicon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #fff; --fg: #111; --secondary: #555; --tertiary: #888; --quaternary: #ccc; --border: #ebebeb; }
    .dark { --bg: #0a0a0a; --fg: #ededed; --secondary: #aaa; --tertiary: #555; --quaternary: #333; --border: #1e1e1e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 620px; margin: 0 auto; padding: 0 24px; }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px 0;
    }
    nav a.brand {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--fg);
      text-decoration: none;
    }
    nav .links { display: flex; align-items: center; gap: 12px; }
    nav .links a {
      font-size: 13px;
      color: var(--tertiary);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav .links a:hover { color: var(--fg); }
    main { text-align: center; padding: 80px 0 128px; }
    .label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--quaternary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 48px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
    }
    p {
      font-size: 15px;
      color: var(--tertiary);
      margin-bottom: 2.5rem;
    }
    .back-link {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--tertiary);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--fg); }
    @media (min-width: 640px) {
      nav .links { gap: 28px; }
      nav .links a { font-size: 14px; }
      nav a.brand { font-size: 15px; }
      h1 { font-size: 72px; }
    }
  </style>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (!saved && prefersDark);
      if (isDark) {
        document.documentElement.classList.add('dark');
      }
      var favicon = document.getElementById('favicon');
      if (favicon) favicon.href = isDark ? '/favicon-dark.svg' : '/favicon-light.svg';
    })();
  </script>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="brand">gabriel gabateli</a>
      <div class="links">
        <a href="/blog">blog</a>
        <a href="/tags">tags</a>
        <a href="/#projects">projects</a>
        <a href="/cv.pdf" target="_blank" rel="noopener">cv</a>
      </div>
    </nav>
    <main>
      <p class="label">error</p>
      <h1>500</h1>
      <p>algo deu errado.</p>
      <a href="/" class="back-link">voltar ao início →</a>
    </main>
  </div>
</body>
</html>
