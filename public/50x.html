<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>erro — gabriel gabateli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #fff; --fg: #ededed; --text: #111; --muted: #666; --faint: #888; --dot: #ccc; }
    .dark { --bg: #0a0a0a; --fg: #ededed; --text: #ededed; --muted: #666; --faint: #555; --dot: #333; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    main { text-align: center; padding: 2rem; }
    .label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--dot);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 72px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
    }
    p {
      font-size: 15px;
      color: var(--faint);
      margin-bottom: 2.5rem;
    }
    a {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover { color: var(--text); }
  </style>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <main>
    <p class="label">error</p>
    <h1>500</h1>
    <p>algo deu errado.</p>
    <a href="/">voltar ao início →</a>
  </main>
</body>
</html>
